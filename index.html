<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Roue de l'Infortune</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Space Grotesk"', 'sans-serif'],
                        body: ['Manrope', 'sans-serif']
                    },
                    colors: {
                        primary: '#ff89ab',
                        secondary: '#00fbfb',
                        tertiary: '#ac89ff',
                        surface: '#060e1d',
                        'surface-high': '#1a263c'
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #060e1d; color: #dde5fb; overflow-x: hidden; }
        h1, h2, h3, .font-display { font-family: 'Space Grotesk', sans-serif; }
        .glass-panel {
            background: rgba(26, 38, 60, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(64, 72, 90, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        .text-gradient {
            background: linear-gradient(135deg, #ff89ab, #00fbfb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(255, 137, 171, 0.5); }
        .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15; z-index: -1; pointer-events: none; }

        .wheel-3d-container {
            perspective: 1000px;
            transform-style: preserve-3d;
        }
        canvas {
            border-radius: 50%;
            box-shadow:
                0 0 0 10px rgba(26, 38, 60, 0.8),
                0 0 40px rgba(0, 251, 251, 0.2),
                inset 0 0 20px rgba(0,0,0,0.5);
            transform: rotateX(15deg);
        }
        .pointer-3d {
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            transform: translateZ(50px) translateY(-10px);
        }

        /* Modal hiding classes */
        #winnerModal { display: none; }
        #winnerModal.show { display: flex; }
    </style>

</head>

<body class="bg-surface text-[#dde5fb] min-h-screen flex flex-col items-center pt-8 relative">

    <!-- Ambient Orbs -->
    <div class="orb w-[600px] h-[600px] bg-primary top-[-100px] left-[-200px]"></div>
    <div class="orb w-[500px] h-[500px] bg-secondary bottom-[-100px] right-[-100px]"></div>
    <div class="orb w-[400px] h-[400px] bg-tertiary top-[20%] right-[10%]"></div>

    <h1 class="text-6xl font-bold mb-10 tracking-tight font-display text-gradient drop-shadow-lg z-10">La Roue de l'Infortune</h1>

    <div class="flex flex-col xl:flex-row items-center xl:items-start justify-center gap-12 w-full max-w-7xl px-4 z-10">

        <div class="wheel-section glass-panel p-10 rounded-[3rem] flex flex-col items-center relative">

            <div class="wheel-3d-container relative w-[600px] h-[600px] flex justify-center items-center">
                <div class="pointer-3d absolute top-[-20px] left-1/2 -translate-x-1/2 w-0 h-0 border-l-[20px] border-l-transparent border-r-[20px] border-r-transparent border-t-[40px] border-t-primary z-20"></div>
                <div class="pointer-3d absolute top-[-25px] left-1/2 -translate-x-1/2 w-0 h-0 border-l-[15px] border-l-transparent border-r-[15px] border-r-transparent border-t-[30px] border-t-white opacity-40 z-20"></div>

                <canvas id="wheelCanvas" width="600" height="600" class="w-full h-full"></canvas>
            </div>

            <button id="spinButton" class="mt-12 bg-gradient-to-r from-primary to-[#ff5290] text-[#490013] font-display font-bold text-2xl py-5 px-12 rounded-full shadow-[0_0_30px_rgba(255,137,171,0.4)] transition-all duration-300 hover:scale-105 hover:shadow-[0_0_40px_rgba(255,137,171,0.7)] active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                LANCER LE TIRAGE
            </button>
        </div>

        <div class="list-section glass-panel p-8 rounded-3xl w-full max-w-sm flex flex-col gap-6">
            <h2 class="text-2xl font-display font-semibold text-secondary mb-2">Paramètres</h2>

            <div class="flex flex-col gap-2">
                <label for="nameList" class="text-sm uppercase tracking-wider text-[#a3abc0]">Participants</label>
                <textarea id="nameList" class="w-full h-[300px] bg-[#0a1324]/80 border border-[#40485a]/50 rounded-2xl p-4 text-[#dde5fb] font-body resize-none focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-colors"></textarea>
            </div>

            <div class="flex items-center justify-between bg-[#0a1324]/80 border border-[#40485a]/50 p-4 rounded-2xl">
                <label for="drawCountSelect" class="text-sm uppercase tracking-wider text-[#a3abc0]">Nombre de gagnants :</label>
                <select id="drawCountSelect" class="bg-surface text-secondary border border-[#40485a] rounded-lg px-3 py-1 font-display font-bold focus:outline-none focus:border-primary">
                    <option value="1">1</option>
                </select>
            </div>

            <button id="updateButton" class="w-full bg-[#1a263c] border border-[#40485a] hover:bg-[#22304a] hover:border-secondary text-[#dde5fb] font-display font-semibold py-3 rounded-xl transition-all duration-300 active:scale-95">
                Mettre à jour la roue
            </button>
        </div>
    </div>

    <!-- Modal -->
    <div id="winnerModal" class="modal-overlay fixed inset-0 bg-[#060e1d]/80 backdrop-blur-md hidden justify-center items-center z-50">
        <div class="modal-content glass-panel p-12 rounded-[3rem] text-center max-w-lg w-full transform scale-95 opacity-0">
            <h2 id="modalTitle" class="text-3xl font-display font-bold text-tertiary mb-6 uppercase tracking-wider">Le Gagnant Est :</h2>
            <div id="modalWinnerName" class="text-5xl font-display font-bold text-gradient mb-10 drop-shadow-[0_0_15px_rgba(255,137,171,0.5)]"></div>
            <button id="closeModalButton" class="bg-surface border border-[#40485a] hover:bg-[#1a263c] hover:border-secondary text-[#dde5fb] font-display font-semibold py-3 px-8 rounded-full transition-all duration-300 active:scale-95">
                Continuer
            </button>
        </div>
    </div>

<script>
        // JAVASCRIPT - Le moteur (v4.8.1)

        const defaultParticipants = [
            'GUILLAS Ronan', 'POULET Mael', 'CLAVEL Dorian', 'DESIRE Dylan',
            'CHOPIN Sunila', 'COSTE Denis', 'CHANDLER Cedric', 'BEVIS Guillaume',
            'PERCHERON Nathan', 'BERENGER Quentin', 'FEUILLIE Cedric', 'JOUBERT Jérôme'
        ];

        const buttonNames = [
            "QUI S'Y COLLE ?", "DÉSIGNER LA VICTIME", "QUE LE SORT DÉCIDE !",
            "CHOISIR L'ÉLU", "DÉSIGNER LE \"VOLONTAIRE\"", "CHERCHER LE PIGEON",
            "SACRIFIER UN COLLÈGUE", "QUI VA MORFLER ?", "QUI VA TRINQUER ?",
            "LA PATATE CHAUDE", "LA ROUE DE L'INFORTUNE", "ET LE \"GAGNANT\" EST...",
            "PLOUF-PLOUF..."
        ];

        let participants = [];
                const colors = [
            '#ff89ab', '#00fbfb', '#ac89ff', '#ff709e', '#00ecec', '#bda1ff',
            '#ff89ab', '#00fbfb', '#ac89ff', '#ff709e', '#00ecec', '#bda1ff',
            '#ff89ab', '#00fbfb', '#ac89ff', '#ff709e', '#00ecec', '#bda1ff'
        ];

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinButton = document.getElementById('spinButton');
        const updateButton = document.getElementById('updateButton');
        const nameListTextArea = document.getElementById('nameList');
        const drawCountSelect = document.getElementById('drawCountSelect');
        const winnerModal = document.getElementById('winnerModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalWinnerName = document.getElementById('modalWinnerName');
        const closeModalButton = document.getElementById('closeModalButton');

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width / 2 - 10;

        let currentRotation = 0;
        let isSpinning = false;
        let spinsRemaining = 0;
        let currentWinners = [];
        let originalParticipantsBeforeSpin = [];

        function setRandomButtonText() {
            const randomIndex = Math.floor(Math.random() * buttonNames.length);
            spinButton.textContent = buttonNames[randomIndex];
        }

                function showWinnerModal() {
            if (currentWinners.length === 1) {
                modalTitle.textContent = "Le Gagnant Est :";
                modalWinnerName.innerHTML = currentWinners[0];
            } else {
                modalTitle.textContent = "Les Gagnants Sont :";
                const listHtml = `<ul class="flex flex-col gap-2">${currentWinners.map(w => `<li>${w}</li>`).join('')}</ul>`;
                modalWinnerName.innerHTML = listHtml;
                modalWinnerName.classList.remove('text-5xl');
                modalWinnerName.classList.add('text-3xl');
            }
            winnerModal.classList.add('show');

            // GSAP Entrance Animation
            gsap.fromTo(".modal-content",
                { scale: 0.8, opacity: 0, y: 50 },
                { scale: 1, opacity: 1, y: 0, duration: 0.6, ease: "back.out(1.5)" }
            );
        }

        function hideWinnerModal() {
            gsap.to(".modal-content", {
                scale: 0.8, opacity: 0, y: 50, duration: 0.3, ease: "power2.in",
                onComplete: () => {
                    winnerModal.classList.remove('show');
                    // reset classes
                    modalWinnerName.classList.remove('text-3xl');
                    modalWinnerName.classList.add('text-5xl');
                }
            });
        }

        // C'est cette fonction qui était buggée dans le v4.7
        // et que j'ai corrigée pour la v4.8
        function populateDrawCountSelect(count) {
            const oldValue = parseInt(drawCountSelect.value) || 1;

            drawCountSelect.innerHTML = '';

            if (count === 0) {
                const option = document.createElement('option');
                option.value = 0;
                option.textContent = 0;
                drawCountSelect.appendChild(option);
            } else {
                for (let i = 1; i <= count; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = i;
                    drawCountSelect.appendChild(option);
                }
            }

            if (oldValue > 0 && oldValue <= count) {
                drawCountSelect.value = oldValue;
            } else {
                drawCountSelect.value = 1;
            }
        }

        function updateWheelFromList() {
            const namesRaw = nameListTextArea.value.trim();
            participants = namesRaw.split('\n')
                                 .map(name => name.trim())
                                 .filter(name => name.length > 0);

            populateDrawCountSelect(participants.length);
            drawWheel();
        }

        function drawWheel() {
            // ... (drawWheel est inchangée)
            const numSegments = participants.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (numSegments === 0) {
                ctx.fillStyle = '#555';
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText("Liste vide !", centerX, centerY);
                spinButton.disabled = true;
                return;
            }

            spinButton.disabled = false;
            const arcSize = (2 * Math.PI) / numSegments;

            let fontSize = 20;
            if (numSegments > 12) fontSize = 18;
            if (numSegments > 18) fontSize = 16;
            if (numSegments > 25) fontSize = 14;

            for (let i = 0; i < numSegments; i++) {
                const startAngle = i * arcSize;
                const endAngle = (i + 1) * arcSize;

                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#1a263c";
                ctx.stroke();

                ctx.save();
                ctx.fillStyle = '#000';
                ctx.font = `bold ${fontSize}px Arial`;
                ctx.textBaseline = 'middle';
                const midAngle = startAngle + arcSize / 2;
                ctx.translate(centerX, centerY);
                ctx.rotate(midAngle);
                const isReversed = (midAngle > Math.PI / 2 && midAngle < Math.PI * 1.5);
                ctx.textAlign = 'center';

                if (isReversed) {
                    ctx.rotate(Math.PI);
                    ctx.fillText(participants[i], -(radius * 0.5), 0);
                } else {
                    ctx.fillText(participants[i], (radius * 0.5), 0);
                }
                ctx.restore();
            }
        }

        function startSpinProcess() {
            if (isSpinning) return;
            if (participants.length === 0) return;

            isSpinning = true;
            toggleControls(false);

            spinsRemaining = parseInt(drawCountSelect.value) || 1;
            if (spinsRemaining > participants.length) {
                spinsRemaining = participants.length;
            }
            currentWinners = [];

            performSingleSpin();
        }

        const spinDuration = 6000;

                function performSingleSpin() {
            if (spinsRemaining <= 0 || participants.length === 0) {
                endSpinProcess();
                return;
            }

            originalParticipantsBeforeSpin = [...participants];

            const durationInSeconds = spinDuration / 1000;
            const rotations = 5;

            const randomSpin = Math.random() * 360;
            const totalRotation = (rotations * 360) + randomSpin;

            currentRotation += totalRotation;

            // GSAP Animation instead of CSS transition
            gsap.to(canvas, {
                rotation: currentRotation,
                duration: durationInSeconds,
                ease: "power4.out",
                onComplete: handleSpinEnd
            });
        }

        function handleSpinEnd() {
            if (!isSpinning) return;

            const numSegments = originalParticipantsBeforeSpin.length;
            if (numSegments === 0) return;

            const degreesPerSegment = 360 / numSegments;
            const offsetDegrees = 270;
            const normalizedAngle = (360 - (currentRotation % 360) + offsetDegrees) % 360;
            const winnerIndex = Math.floor(normalizedAngle / degreesPerSegment);

            const winner = originalParticipantsBeforeSpin[winnerIndex];

            currentWinners.push(winner);
            spinsRemaining--;

            confetti({
                particleCount: 150, spread: 90, origin: { y: 0.6 },
                colors: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF']
            });

            const indexToRemove = participants.indexOf(winner);
            if (indexToRemove > -1) {
                participants.splice(indexToRemove, 1);
            }
            nameListTextArea.value = participants.join('\n');

            if (spinsRemaining > 0) {
                setTimeout(() => {
                    updateWheelFromList();
                    performSingleSpin();
                }, 1500);
            } else {
                endSpinProcess();
            }
        }

        function endSpinProcess() {
            isSpinning = false;
            toggleControls(true);

            canvas.style.transition = 'transform 0s linear';

            showWinnerModal();
        }

        function toggleControls(enabled) {
            spinButton.disabled = !enabled;
            updateButton.disabled = !enabled;
            drawCountSelect.disabled = !enabled;
            nameListTextArea.disabled = !enabled;
        }

        // --- DÉMARRAGE ---
        spinButton.addEventListener('click', startSpinProcess);

        // LA LIGNE QUI CASSAIT TOUT (le 'g' fantôme) EST VÉRIFIÉE
        updateButton.addEventListener('click', updateWheelFromList);

        closeModalButton.addEventListener('click', () => {
            hideWinnerModal();
            updateWheelFromList();
            setRandomButtonText();
        });

        // Chargement initial
        nameListTextArea.value = defaultParticipants.join('\n');
        setRandomButtonText();
        updateWheelFromList();

    </script>

</body>
</html>
