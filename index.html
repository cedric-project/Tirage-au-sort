<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Roue de l'Infortune 3D</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        glass: 'rgba(255, 255, 255, 0.03)',
                        glassDark: 'rgba(10, 10, 20, 0.6)',
                        neonAccent: '#00f3ff',
                        neonPink: '#ff00e5',
                        neonPurple: '#7000ff',
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.37)',
                        'glass-inset': 'inset 0 1px 1px rgba(255,255,255,0.1)',
                        'neon': '0 0 10px rgba(0,243,255,0.7), 0 0 20px rgba(0,243,255,0.5)',
                        'neon-pink': '0 0 10px rgba(255,0,229,0.7), 0 0 30px rgba(255,0,229,0.4)',
                        'cyber': '0 0 15px rgba(112,0,255,0.8), inset 0 0 10px rgba(112,0,255,0.5)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background: radial-gradient(circle at top right, #1b103f 0%, #080612 50%, #04030a 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden; /* Prevent scrolling during animations */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Abstract shapes for background */
        .bg-shape {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }

        .shape1 { top: 5%; left: 5%; width: 400px; height: 400px; background: #ff00e5; border-radius: 50%; filter: blur(100px); }
        .shape2 { bottom: 5%; right: 5%; width: 500px; height: 500px; background: #00f3ff; border-radius: 50%; filter: blur(120px); animation-delay: -5s; }
        .shape3 { top: 40%; left: 40%; width: 300px; height: 300px; background: #7000ff; border-radius: 50%; filter: blur(90px); animation: float 8s infinite ease-in-out alternate-reverse; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Wheel 3D Container */
        .wheel-container-3d {
            perspective: 1000px;
            position: relative;
        }

        .wheel-inner-3d {
            transform-style: preserve-3d;
            transform: rotateX(0deg); /* Flat wheel */
            transition: transform 0.5s ease;
        }

        .wheel-inner-3d:hover {
            transform: scale(1.02);
        }

        #wheelCanvas {
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
            /* Base rotation transition handled by JS, but we ensure it plays nice with 3D */
            transform-origin: center center;
        }

        /* The pointer (selector) */
        .wheel-pointer {
            position: absolute;
            top: 50%;
            right: -15px;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: #fff;
            clip-path: polygon(0 50%, 100% 0, 100% 100%);
            filter: drop-shadow(-5px 0px 10px rgba(255, 255, 255, 0.8)) drop-shadow(-10px 0px 20px rgba(0, 243, 255, 0.8));
            z-index: 30;
        }

        /* Custom Scrollbar for Textarea */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Modal animations handled by GSAP, initial state */
        #winnerModal {
            display: none; /* Changed from opacity/pointer-events for GSAP control */
            position: fixed;
            inset: 0;
            z-index: 50;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center relative">

    <!-- Background Shapes -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <header class="w-full text-center py-6 absolute top-0 z-10 gs-header">
        <h1 class="text-5xl md:text-6xl font-extrabold tracking-wider uppercase text-transparent bg-clip-text bg-gradient-to-r from-neonAccent to-neonPink drop-shadow-[0_0_15px_rgba(255,0,229,0.5)]">
            La Roue de l'Infortune
        </h1>
    </header>

    <main class="w-full max-w-7xl px-4 flex flex-col md:flex-row items-center justify-center gap-12 mt-20">

        <!-- Control Panel (Left) -->
        <div class="bg-glass backdrop-blur-3xl rounded-3xl p-8 w-full md:w-1/3 flex flex-col gap-6 gs-control-panel z-10 border border-white/10 shadow-glass shadow-glass-inset">
            <div>
                <label for="nameList" class="block text-sm font-semibold mb-2 text-neonAccent uppercase tracking-wide">Participants</label>
                <textarea id="nameList" rows="8" class="w-full bg-glassDark text-white/90 border border-white/10 rounded-xl p-4 focus:outline-none focus:border-neonAccent focus:ring-2 focus:ring-neonAccent/50 transition-all resize-none font-mono text-sm shadow-inner"></textarea>
            </div>

            <button id="updateButton" class="w-full py-3 rounded-xl font-bold tracking-wide bg-white/5 hover:bg-white/10 border border-white/10 transition-all hover:shadow-[0_0_20px_rgba(255,255,255,0.2)] hover:-translate-y-0.5 text-gray-300 hover:text-white">
                Mettre à jour la Roue
            </button>

            <div class="flex items-center justify-between gap-4 bg-glassDark p-4 rounded-xl border border-white/10 shadow-inner">
                <label for="drawCountSelect" class="text-sm font-semibold text-gray-300">Nombre de tirages :</label>
                <select id="drawCountSelect" class="bg-transparent text-white font-bold text-lg focus:outline-none cursor-pointer">
                    <option value="1">1</option>
                </select>
            </div>

            <button id="spinButton" class="w-full py-5 mt-6 rounded-2xl font-black text-2xl tracking-widest bg-gradient-to-r from-neonPink via-purple-500 to-neonAccent hover:from-neonAccent hover:via-purple-500 hover:to-neonPink text-white transition-all transform hover:scale-110 hover:-translate-y-2 shadow-[0_0_20px_rgba(255,0,229,0.5),_0_0_40px_rgba(0,243,255,0.5)] border-2 border-white/30 uppercase">
                TOURNER !
            </button>
        </div>

        <!-- Wheel Section (Right) -->
        <div class="w-full md:w-2/3 flex justify-center items-center wheel-container-3d gs-wheel">
            <div class="wheel-inner-3d relative">
                <!-- Pointer pointing to the center right -->
                <div class="wheel-pointer"></div>
                <!-- Adding a glowing ring behind the canvas -->
                <div class="absolute inset-[-20px] rounded-full bg-gradient-to-tr from-neonPink via-neonPurple to-neonAccent blur-[30px] opacity-60 z-0 animate-[spin_6s_linear_infinite]"></div>
                <canvas id="wheelCanvas" width="600" height="600" class="rounded-full border-[12px] border-gray-900/80 shadow-[0_0_50px_rgba(0,0,0,0.8),inset_0_0_20px_rgba(0,0,0,1)] relative z-10"></canvas>
                <!-- Central Axle -->
                <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-16 h-16 bg-gradient-to-br from-gray-700 to-gray-900 rounded-full border-[6px] border-gray-800 shadow-[inset_0_4px_10px_rgba(0,0,0,0.9),_0_0_30px_rgba(0,0,0,0.8)] z-40 flex items-center justify-center"><div class="w-4 h-4 rounded-full bg-neonAccent shadow-[0_0_10px_#00f3ff]"></div></div>
            </div>
        </div>
    </main>

    <!-- Winner Modal -->
    <div id="winnerModal" class="flex">
        <div class="modal-overlay"></div>
        <div class="bg-glass backdrop-blur-3xl rounded-[2.5rem] p-12 max-w-lg w-full z-10 text-center border border-white/10 shadow-[0_0_50px_rgba(255,0,229,0.3)] transform scale-90 opacity-0 relative overflow-hidden" id="modalContent">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-neonAccent via-neonPink to-neonPurple"></div>
            <h2 id="modalTitle" class="text-3xl font-bold mb-6 text-gray-200">Le Gagnant Est :</h2>
            <div id="modalWinnerName" class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-neonPink via-white to-neonAccent mb-8 drop-shadow-[0_0_20px_rgba(255,255,255,0.4)] animate-pulse">
                Nom du Gagnant
            </div>
            <button id="closeModalButton" class="px-8 py-3 rounded-full font-bold bg-white text-black hover:bg-gray-200 transition-colors shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                Continuer
            </button>
        </div>
    </div>

    <script>

        // JAVASCRIPT - Le moteur (v4.8.1)


        // --- GSAP Initial Animations ---
        gsap.from(".gs-header", {y: -50, opacity: 0, duration: 1, ease: "back.out(1.7)"});
        gsap.from(".gs-control-panel", {x: -50, opacity: 0, duration: 1, delay: 0.3, ease: "power3.out"});
        gsap.from(".gs-wheel", {scale: 0.8, opacity: 0, duration: 1.2, delay: 0.5, ease: "elastic.out(1, 0.5)"});

        // --- Core Logic ---
        const defaultParticipants = [
            'GUILLAS Ronan', 'POULET Mael', 'CLAVEL Dorian', 'DESIRE Dylan',
            'CHOPIN Sunila', 'COSTE Denis', 'CHANDLER Cedric', 'BEVIS Guillaume',
            'PERCHERON Nathan', 'BERENGER Quentin', 'FEUILLIE Cedric', 'JOUBERT Jérôme'
        ];

        const buttonNames = [
            "QUI S'Y COLLE ?", "DÉSIGNER LA VICTIME", "QUE LE SORT DÉCIDE !",
            "CHOISIR L'ÉLU", "DÉSIGNER LE \"VOLONTAIRE\"", "CHERCHER LE PIGEON",
            "SACRIFIER UN COLLÈGUE", "QUI VA MORFLER ?", "QUI VA TRINQUER ?",
            "LA PATATE CHAUDE", "LA ROUE DE L'INFORTUNE", "ET LE \"GAGNANT\" EST...",
            "PLOUF-PLOUF..."
        ];

        let participants = [];
        const colors = [
            '#ff007f', // Neon Pink
            '#00f3ff', // Cyan
            '#7000ff', // Purple
            '#ffea00', // Yellow
            '#00ff66', // Green
            '#ff5e00', // Orange
            '#ff007f', '#00f3ff', '#7000ff', '#ffea00', '#00ff66', '#ff5e00',
            '#ff007f', '#00f3ff', '#7000ff', '#ffea00', '#00ff66', '#ff5e00',
            '#ff007f', '#00f3ff', '#7000ff', '#ffea00', '#00ff66', '#ff5e00'
        ];

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinButton = document.getElementById('spinButton');
        const updateButton = document.getElementById('updateButton');
        const nameListTextArea = document.getElementById('nameList');
        const drawCountSelect = document.getElementById('drawCountSelect');
        const winnerModal = document.getElementById('winnerModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalWinnerName = document.getElementById('modalWinnerName');
        const closeModalButton = document.getElementById('closeModalButton');

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width / 2 - 10;

        let currentRotation = 0;
        let isSpinning = false;
        let spinsRemaining = 0;
        let currentWinners = [];
        let originalParticipantsBeforeSpin = [];

        function setRandomButtonText() {
            const randomIndex = Math.floor(Math.random() * buttonNames.length);
            spinButton.textContent = buttonNames[randomIndex];
        }

        function showWinnerModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalWinnerName = document.getElementById('modalWinnerName');
            const winnerModal = document.getElementById('winnerModal');

            if (currentWinners.length === 1) {
                modalTitle.textContent = "Le Gagnant Est :";
                modalWinnerName.innerHTML = currentWinners[0];
                modalWinnerName.classList.remove('text-3xl');
                modalWinnerName.classList.add('text-5xl');
            } else {
                modalTitle.textContent = "Les Gagnants Sont :";
                const listHtml = `<ul class="space-y-2 text-left inline-block">${currentWinners.map(w => `<li class="border-b border-gray-600 pb-1">${w}</li>`).join('')}</ul>`;
                modalWinnerName.innerHTML = listHtml;
                modalWinnerName.classList.remove('text-5xl');
                modalWinnerName.classList.add('text-3xl');
            }

            winnerModal.style.display = 'flex';
            gsap.to(winnerModal, {backgroundColor: 'rgba(0,0,0,0.7)', duration: 0.3});
            gsap.to("#modalContent", {scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.5)"});
        }

        function hideWinnerModal() {
            const winnerModal = document.getElementById('winnerModal');
            gsap.to("#modalContent", {scale: 0.9, opacity: 0, duration: 0.3, ease: "power2.in"});
            gsap.to(winnerModal, {backgroundColor: 'rgba(0,0,0,0)', duration: 0.3, delay: 0.2, onComplete: () => {
                winnerModal.style.display = 'none';
            }});
        }

        // C'est cette fonction qui était buggée dans le v4.7
        // et que j'ai corrigée pour la v4.8
        function populateDrawCountSelect(count) {
            const oldValue = parseInt(drawCountSelect.value) || 1;

            drawCountSelect.innerHTML = '';

            if (count === 0) {
                const option = document.createElement('option');
                option.value = 0;
                option.textContent = 0;
                drawCountSelect.appendChild(option);
            } else {
                for (let i = 1; i <= count; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = i;
                    drawCountSelect.appendChild(option);
                }
            }

            if (oldValue > 0 && oldValue <= count) {
                drawCountSelect.value = oldValue;
            } else {
                drawCountSelect.value = 1;
            }
        }

        function updateWheelFromList() {
            const namesRaw = nameListTextArea.value.trim();
            participants = namesRaw.split('\n')
                                 .map(name => name.trim())
                                 .filter(name => name.length > 0);

            populateDrawCountSelect(participants.length);
            drawWheel();
        }

        function drawWheel() {
            // ... (drawWheel est inchangée)
            const numSegments = participants.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (numSegments === 0) {
                ctx.fillStyle = '#555';
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText("Liste vide !", centerX, centerY);
                spinButton.disabled = true;
                return;
            }

            spinButton.disabled = false;
            const arcSize = (2 * Math.PI) / numSegments;

            let fontSize = 20;
            if (numSegments > 12) fontSize = 18;
            if (numSegments > 18) fontSize = 16;
            if (numSegments > 25) fontSize = 14;

            for (let i = 0; i < numSegments; i++) {
                const startAngle = i * arcSize;
                const endAngle = (i + 1) * arcSize;

                // Create radial gradient for 3D effect on segment
                const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
                const baseColor = colors[i % colors.length];
                gradient.addColorStop(0, '#ffffff'); // inner highlight
                gradient.addColorStop(0.2, baseColor); // main color
                gradient.addColorStop(1, '#1a1a1a'); // outer shadow

                ctx.beginPath();
                ctx.fillStyle = gradient;
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fill();

                // Add inner stroke for definition
                ctx.lineWidth = 2;
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.stroke();

                ctx.save();
                ctx.fillStyle = '#ffffff';
                ctx.font = `800 ${fontSize}px 'Poppins', sans-serif`;
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                ctx.textBaseline = 'middle';
                const midAngle = startAngle + arcSize / 2;
                ctx.translate(centerX, centerY);
                ctx.rotate(midAngle);
                const isReversed = (midAngle > Math.PI / 2 && midAngle < Math.PI * 1.5);
                ctx.textAlign = 'center';

                if (isReversed) {
                    ctx.rotate(Math.PI);
                    ctx.fillText(participants[i], -(radius * 0.5), 0);
                } else {
                    ctx.fillText(participants[i], (radius * 0.5), 0);
                }
                ctx.restore();
            }
        }

        function startSpinProcess() {
            if (isSpinning) return;
            if (participants.length === 0) return;

            isSpinning = true;
            toggleControls(false);

            spinsRemaining = parseInt(drawCountSelect.value) || 1;
            if (spinsRemaining > participants.length) {
                spinsRemaining = participants.length;
            }
            currentWinners = [];

            performSingleSpin();
        }

        const spinDuration = 6000;

        function performSingleSpin() {
            if (spinsRemaining <= 0 || participants.length === 0) {
                endSpinProcess();
                return;
            }

            originalParticipantsBeforeSpin = [...participants];

            const durationInSeconds = spinDuration / 1000;
            const rotations = 5;

            const randomSpin = Math.random() * 360;
            const totalRotation = (rotations * 360) + randomSpin;

            currentRotation += totalRotation;

            canvas.style.transition = `transform ${durationInSeconds}s cubic-bezier(0.1, 0.8, 0.2, 1)`;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(handleSpinEnd, spinDuration);
        }

        function handleSpinEnd() {
            if (!isSpinning) return;

            const numSegments = originalParticipantsBeforeSpin.length;
            if (numSegments === 0) return;

            const degreesPerSegment = 360 / numSegments;
            const offsetDegrees = 0; // Pointer is on the right
            const normalizedAngle = (360 - (currentRotation % 360) + offsetDegrees) % 360;
            const winnerIndex = Math.floor(normalizedAngle / degreesPerSegment);

            const winner = originalParticipantsBeforeSpin[winnerIndex];

            currentWinners.push(winner);
            spinsRemaining--;

            const end = Date.now() + 3 * 1000;

            (function frame() {
                confetti({
                    particleCount: 12,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff007f', '#00f3ff', '#7000ff', '#ffea00', '#00ff66', '#ff5e00']
                });
                confetti({
                    particleCount: 12,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff007f', '#00f3ff', '#7000ff', '#ffea00', '#00ff66', '#ff5e00']
                });

                confetti({
                    particleCount: 25,
                    spread: 160,
                    origin: { y: 0.6 },
                    colors: ['#ff007f', '#00f3ff', '#7000ff', '#ffea00', '#00ff66', '#ff5e00'],
                    zIndex: 200
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            const indexToRemove = participants.indexOf(winner);
            if (indexToRemove > -1) {
                participants.splice(indexToRemove, 1);
            }
            nameListTextArea.value = participants.join('\n');

            if (spinsRemaining > 0) {
                setTimeout(() => {
                    updateWheelFromList();
                    performSingleSpin();
                }, 1500);
            } else {
                endSpinProcess();
            }
        }

        function endSpinProcess() {
            isSpinning = false;
            toggleControls(true);

            canvas.style.transition = 'transform 0s linear';

            showWinnerModal();
        }

        function toggleControls(enabled) {
            spinButton.disabled = !enabled;
            updateButton.disabled = !enabled;
            drawCountSelect.disabled = !enabled;
            nameListTextArea.disabled = !enabled;
        }

        // --- DÉMARRAGE ---
        spinButton.addEventListener('click', startSpinProcess);

        // LA LIGNE QUI CASSAIT TOUT (le 'g' fantôme) EST VÉRIFIÉE
        updateButton.addEventListener('click', updateWheelFromList);

        closeModalButton.addEventListener('click', () => {
            hideWinnerModal();
            updateWheelFromList();
            setRandomButtonText();
        });

        // Chargement initial
        nameListTextArea.value = defaultParticipants.join('\n');
        setRandomButtonText();
        updateWheelFromList();


    </script>
</body>
</html>
