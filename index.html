<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Roue de l'Infortune 3D</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Rounded+Mplus+1c:wght@400;500;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                        heading: ['Rounded Mplus 1c', 'sans-serif'],
                    },
                    colors: {
                        clay: {
                            pink: { 50: '#ffc8dd', 100: '#ffb3d9', 200: '#ff99ac', 300: '#ff8fb3', 400: '#ff6a88' },
                            blue: { 50: '#cae9ff', 100: '#a2d2ff', 200: '#7eb8e0', 300: '#5a9fd4' },
                            purple: { 50: '#e4c1f9', 100: '#d4a5f3', 200: '#c48ee8', 300: '#b377dc' },
                            green: { 50: '#d8f3dc', 100: '#b7e4c7', 200: '#95d5b2', 300: '#74c69d' },
                        }
                    },
                    borderRadius: {
                        'clay-sm': '16px',
                        'clay': '24px',
                        'clay-lg': '32px',
                        'clay-xl': '48px',
                        'clay-full': '50px',
                    },
                    boxShadow: {
                        'clay': '-4px -4px 12px rgba(255, 255, 255, 0.6), 4px 4px 12px rgba(255, 143, 179, 0.4), inset -2px -2px 4px rgba(255, 255, 255, 0.2), inset 2px 2px 4px rgba(255, 143, 179, 0.3)',
                        'clay-hover': '-6px -6px 16px rgba(255, 255, 255, 0.7), 6px 6px 16px rgba(255, 143, 179, 0.5), inset -2px -2px 4px rgba(255, 255, 255, 0.2), inset 2px 2px 4px rgba(255, 143, 179, 0.3)',
                        'clay-active': '-2px -2px 8px rgba(255, 255, 255, 0.5), 2px 2px 8px rgba(255, 143, 179, 0.3), inset -3px -3px 6px rgba(255, 255, 255, 0.1), inset 3px 3px 6px rgba(255, 143, 179, 0.4)',
                        'clay-inset': 'inset 3px 3px 8px rgba(200, 170, 220, 0.3), inset -3px -3px 8px rgba(255, 255, 255, 0.5)',
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --clay-pink-light: #ffc8dd;
            --clay-pink-main: #ffb3d9;
            --clay-pink-dark: #ff8fb3;
            --clay-text-primary: #495057;
            --clay-gradient-bg: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }

        body {
            background: var(--clay-gradient-bg);
            color: var(--clay-text-primary);
            overflow: hidden; /* Prevent scrolling during animations */
        }

        /* Abstract shapes for background */
        .bg-shape {
            position: absolute;
            z-index: -1;
            opacity: 0.8;
            border-radius: 50%;
        }

        .shape1 { top: -10%; left: -5%; width: 500px; height: 500px; background: linear-gradient(135deg, #ffc8dd 0%, #ffb3d9 100%); filter: blur(80px); }
        .shape2 { bottom: -10%; right: -5%; width: 600px; height: 600px; background: linear-gradient(135deg, #cae9ff 0%, #a2d2ff 100%); filter: blur(100px); }
        .shape3 { top: 30%; left: 60%; width: 400px; height: 400px; background: linear-gradient(135deg, #e4c1f9 0%, #d4a5f3 100%); filter: blur(90px); }

        .clay-card {
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            border-radius: 48px;
            box-shadow:
                -8px -8px 20px rgba(255, 255, 255, 0.8),
                8px 8px 20px rgba(200, 200, 200, 0.4),
                inset -3px -3px 8px rgba(255, 255, 255, 0.3),
                inset 3px 3px 8px rgba(200, 200, 200, 0.1);
        }

        .clay-input {
            background: linear-gradient(145deg, #f5f5f5, #e8e8e8);
            border-radius: 24px;
            box-shadow:
                inset 4px 4px 10px rgba(200, 200, 200, 0.4),
                inset -4px -4px 10px rgba(255, 255, 255, 0.8);
            border: none;
            color: var(--clay-text-primary);
        }

        .clay-input:focus {
            outline: none;
            box-shadow:
                inset 5px 5px 12px rgba(200, 200, 200, 0.5),
                inset -5px -5px 12px rgba(255, 255, 255, 0.9),
                0 0 0 4px rgba(255, 179, 217, 0.3);
        }

        .clay-btn-primary {
            background: linear-gradient(145deg, #ff99ac, #ff6a88);
            color: #ffffff;
            border-radius: 28px;
            border: none;
            cursor: pointer;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            box-shadow:
                -4px -4px 12px rgba(255, 255, 255, 0.6),
                4px 4px 12px rgba(255, 106, 136, 0.4),
                inset -2px -2px 4px rgba(255, 255, 255, 0.2),
                inset 2px 2px 4px rgba(255, 106, 136, 0.3);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .clay-btn-primary:hover {
            transform: translateY(-3px);
            box-shadow:
                -6px -6px 16px rgba(255, 255, 255, 0.7),
                6px 6px 16px rgba(255, 106, 136, 0.5),
                inset -2px -2px 4px rgba(255, 255, 255, 0.2),
                inset 2px 2px 4px rgba(255, 106, 136, 0.3);
        }

        .clay-btn-primary:active {
            transform: translateY(0);
            box-shadow:
                -2px -2px 8px rgba(255, 255, 255, 0.5),
                2px 2px 8px rgba(255, 106, 136, 0.3),
                inset -3px -3px 6px rgba(255, 255, 255, 0.1),
                inset 3px 3px 6px rgba(255, 106, 136, 0.4);
        }

        .clay-btn-secondary {
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            color: #ff6a88;
            border-radius: 28px;
            border: none;
            cursor: pointer;
            box-shadow:
                -4px -4px 12px rgba(255, 255, 255, 0.8),
                4px 4px 12px rgba(200, 200, 200, 0.3),
                inset -2px -2px 4px rgba(255, 255, 255, 0.5),
                inset 2px 2px 4px rgba(200, 200, 200, 0.1);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .clay-btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow:
                -6px -6px 16px rgba(255, 255, 255, 0.9),
                6px 6px 16px rgba(200, 200, 200, 0.4),
                inset -2px -2px 4px rgba(255, 255, 255, 0.5),
                inset 2px 2px 4px rgba(200, 200, 200, 0.1);
        }

        .clay-btn-secondary:active {
            transform: translateY(0);
            box-shadow:
                -2px -2px 8px rgba(255, 255, 255, 0.6),
                2px 2px 8px rgba(200, 200, 200, 0.2),
                inset -3px -3px 6px rgba(255, 255, 255, 0.3),
                inset 3px 3px 6px rgba(200, 200, 200, 0.2);
        }

        /* Wheel 3D Container */
        .wheel-container-3d {
            perspective: 1000px;
            position: relative;
        }

        .wheel-inner-3d {
            transform-style: preserve-3d;
            transform: rotateX(0deg);
            transition: transform 0.5s ease;
        }

        .wheel-inner-3d:hover {
            transform: scale(1.02);
        }

        #wheelCanvas {
            filter: drop-shadow(-8px 8px 24px rgba(0,0,0,0.15));
            transform-origin: center center;
        }

        /* The pointer (selector) */
        .wheel-pointer {
            position: absolute;
            top: 50%;
            right: -25px;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: linear-gradient(145deg, #ff99ac, #ff6a88);
            clip-path: polygon(0 50%, 100% 0, 100% 100%);
            z-index: 30;
            filter: drop-shadow(-4px 4px 8px rgba(255, 106, 136, 0.4));
        }

        /* Custom Scrollbar for Textarea */
        textarea::-webkit-scrollbar {
            width: 12px;
        }
        textarea::-webkit-scrollbar-track {
            background: transparent;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #dadddf;
            border-radius: 6px;
            border: 3px solid #f5f6f7;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: #abadae;
        }

        #winnerModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative">

    <!-- Background Shapes -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <header class="w-full text-center py-8 absolute top-0 z-10 gs-header">
        <h1 class="text-5xl md:text-6xl font-heading font-extrabold tracking-tight text-clay-pink-400" style="text-shadow: 2px 2px 4px rgba(255, 143, 179, 0.3), -1px -1px 2px rgba(255, 255, 255, 0.8);">
            La Roue de l'Infortune
        </h1>
    </header>

    <main class="w-full max-w-7xl px-4 flex flex-col md:flex-row items-center justify-center gap-12 mt-20">

        <!-- Control Panel (Left) -->
        <div class="clay-card p-10 w-full md:w-1/3 flex flex-col gap-6 gs-control-panel z-10">
            <div>
                <label for="nameList" class="block text-sm font-bold mb-3 text-clay-pink-400 uppercase tracking-wide font-heading">Participants</label>
                <textarea id="nameList" rows="8" class="clay-input w-full p-4 resize-none font-mono text-sm"></textarea>
            </div>

            <button id="updateButton" class="clay-btn-secondary w-full py-4 font-bold tracking-wide">
                Mettre à jour la Roue
            </button>

            <div class="flex items-center justify-between gap-4 clay-input p-4">
                <label for="drawCountSelect" class="text-sm font-bold text-gray-600">Nombre de tirages :</label>
                <select id="drawCountSelect" class="bg-transparent text-clay-pink-400 font-bold text-lg focus:outline-none cursor-pointer w-16 text-center">
                    <option value="1">1</option>
                </select>
            </div>

            <button id="spinButton" class="clay-btn-primary w-full py-5 mt-4 font-black text-2xl tracking-widest uppercase font-heading">
                TOURNER !
            </button>
        </div>

        <!-- Wheel Section (Right) -->
        <div class="w-full md:w-2/3 flex justify-center items-center wheel-container-3d gs-wheel">
            <div class="wheel-inner-3d relative">
                <!-- Pointer pointing to the center right -->
                <div class="wheel-pointer"></div>
                <canvas id="wheelCanvas" width="600" height="600" class="rounded-full relative z-10" style="background: linear-gradient(145deg, #ffffff, #f0f0f0); box-shadow: -8px -8px 20px rgba(255, 255, 255, 0.8), 8px 8px 20px rgba(200, 200, 200, 0.4), inset -3px -3px 8px rgba(255, 255, 255, 0.3), inset 3px 3px 8px rgba(200, 200, 200, 0.1); border: 8px solid #ffffff;"></canvas>
                <!-- Central Axle -->
                <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-20 h-20 rounded-full z-40 flex items-center justify-center" style="background: linear-gradient(145deg, #f5f5f5, #e8e8e8); box-shadow: -4px -4px 10px rgba(255, 255, 255, 0.8), 4px 4px 10px rgba(200, 200, 200, 0.4), inset 2px 2px 4px rgba(255, 255, 255, 0.5), inset -2px -2px 4px rgba(200, 200, 200, 0.2);">
                    <div class="w-8 h-8 rounded-full" style="background: linear-gradient(145deg, #ffc8dd, #ffb3d9); box-shadow: inset 2px 2px 5px rgba(255, 255, 255, 0.5), inset -2px -2px 5px rgba(200, 200, 200, 0.2);"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Winner Modal -->
    <div id="winnerModal" class="flex">
        <div class="modal-overlay"></div>
        <div class="clay-card p-12 max-w-lg w-full z-10 text-center transform scale-90 opacity-0 relative overflow-hidden" id="modalContent">
            <h2 id="modalTitle" class="text-3xl font-bold mb-6  font-heading">Le Gagnant Est :</h2>
            <div id="modalWinnerName" class="text-5xl font-black text-clay-pink-400 mb-8 font-heading" style="text-shadow: 2px 2px 4px rgba(255, 143, 179, 0.3), -1px -1px 2px rgba(255, 255, 255, 0.8);">
                Nom du Gagnant
            </div>
            <button id="closeModalButton" class="clay-btn-primary px-10 py-4 font-bold text-lg">
                Continuer
            </button>
        </div>
    </div>

    <script>

        // JAVASCRIPT - Le moteur (v4.8.1)


        // --- GSAP Initial Animations ---
        gsap.from(".gs-header", {y: -50, opacity: 0, duration: 1, ease: "back.out(1.7)"});
        gsap.from(".gs-control-panel", {x: -50, opacity: 0, duration: 1, delay: 0.3, ease: "power3.out"});
        gsap.from(".gs-wheel", {scale: 0.8, opacity: 0, duration: 1.2, delay: 0.5, ease: "elastic.out(1, 0.5)"});

        // --- Core Logic ---
        const defaultParticipants = [
            'GUILLAS Ronan', 'POULET Mael', 'CLAVEL Dorian', 'DESIRE Dylan',
            'CHOPIN Sunila', 'COSTE Denis', 'CHANDLER Cedric', 'BEVIS Guillaume',
            'PERCHERON Nathan', 'BERENGER Quentin', 'FEUILLIE Cedric', 'JOUBERT Jérôme'
        ];

        const buttonNames = [
            "QUI S'Y COLLE ?", "DÉSIGNER LA VICTIME", "QUE LE SORT DÉCIDE !",
            "CHOISIR L'ÉLU", "DÉSIGNER LE \"VOLONTAIRE\"", "CHERCHER LE PIGEON",
            "SACRIFIER UN COLLÈGUE", "QUI VA MORFLER ?", "QUI VA TRINQUER ?",
            "LA PATATE CHAUDE", "LA ROUE DE L'INFORTUNE", "ET LE \"GAGNANT\" EST...",
            "PLOUF-PLOUF..."
        ];

        let participants = [];
        const colors = [
            '#ffb3d9', // Pink
            '#cae9ff', // Blue
            '#e4c1f9', // Purple
            '#d8f3dc', // Green
            '#ffe6a7', // Yellow
            '#ffc8dd', '#a2d2ff', '#d4a5f3', '#b7e4c7', '#ffd98e',
            '#ffb3d9', '#cae9ff', '#e4c1f9', '#d8f3dc', '#ffe6a7',
            '#ffc8dd', '#a2d2ff', '#d4a5f3', '#b7e4c7', '#ffd98e'
        ];

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinButton = document.getElementById('spinButton');
        const updateButton = document.getElementById('updateButton');
        const nameListTextArea = document.getElementById('nameList');
        const drawCountSelect = document.getElementById('drawCountSelect');
        const winnerModal = document.getElementById('winnerModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalWinnerName = document.getElementById('modalWinnerName');
        const closeModalButton = document.getElementById('closeModalButton');

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = canvas.width / 2 - 10;

        let currentRotation = 0;
        let isSpinning = false;
        let spinsRemaining = 0;
        let currentWinners = [];
        let originalParticipantsBeforeSpin = [];

        function setRandomButtonText() {
            const randomIndex = Math.floor(Math.random() * buttonNames.length);
            spinButton.textContent = buttonNames[randomIndex];
        }

        function showWinnerModal() {
            const modalTitle = document.getElementById('modalTitle');
            const modalWinnerName = document.getElementById('modalWinnerName');
            const winnerModal = document.getElementById('winnerModal');

            if (currentWinners.length === 1) {
                modalTitle.textContent = "Le Gagnant Est :";
                modalWinnerName.innerHTML = currentWinners[0];
                modalWinnerName.classList.remove('text-3xl');
                modalWinnerName.classList.add('text-5xl');
            } else {
                modalTitle.textContent = "Les Gagnants Sont :";
                const listHtml = `<ul class="space-y-2 text-left inline-block">${currentWinners.map(w => `<li class="border-b border-gray-600 pb-1">${w}</li>`).join('')}</ul>`;
                modalWinnerName.innerHTML = listHtml;
                modalWinnerName.classList.remove('text-5xl');
                modalWinnerName.classList.add('text-3xl');
            }

            winnerModal.style.display = 'flex';
            gsap.to(winnerModal, {backgroundColor: 'rgba(255,255,255,0.3)', duration: 0.3});
            gsap.to("#modalContent", {scale: 1, opacity: 1, duration: 0.5, ease: "back.out(1.5)"});
        }

        function hideWinnerModal() {
            const winnerModal = document.getElementById('winnerModal');
            gsap.to("#modalContent", {scale: 0.9, opacity: 0, duration: 0.3, ease: "power2.in"});
            gsap.to(winnerModal, {backgroundColor: 'rgba(255,255,255,0)', duration: 0.3, delay: 0.2, onComplete: () => {
                winnerModal.style.display = 'none';
            }});
        }

        // C'est cette fonction qui était buggée dans le v4.7
        // et que j'ai corrigée pour la v4.8
        function populateDrawCountSelect(count) {
            const oldValue = parseInt(drawCountSelect.value) || 1;

            drawCountSelect.innerHTML = '';

            if (count === 0) {
                const option = document.createElement('option');
                option.value = 0;
                option.textContent = 0;
                drawCountSelect.appendChild(option);
            } else {
                for (let i = 1; i <= count; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = i;
                    drawCountSelect.appendChild(option);
                }
            }

            if (oldValue > 0 && oldValue <= count) {
                drawCountSelect.value = oldValue;
            } else {
                drawCountSelect.value = 1;
            }
        }

        function updateWheelFromList() {
            const namesRaw = nameListTextArea.value.trim();
            participants = namesRaw.split('\n')
                                 .map(name => name.trim())
                                 .filter(name => name.length > 0);

            populateDrawCountSelect(participants.length);
            drawWheel();
        }

        function drawWheel() {
            // ... (drawWheel est inchangée)
            const numSegments = participants.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (numSegments === 0) {
                ctx.fillStyle = '#555';
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText("Liste vide !", centerX, centerY);
                spinButton.disabled = true;
                return;
            }

            spinButton.disabled = false;
            const arcSize = (2 * Math.PI) / numSegments;

            let fontSize = 20;
            if (numSegments > 12) fontSize = 18;
            if (numSegments > 18) fontSize = 16;
            if (numSegments > 25) fontSize = 14;

            for (let i = 0; i < numSegments; i++) {
                const startAngle = i * arcSize;
                const endAngle = (i + 1) * arcSize;

                // Soft pastel colors
                const baseColor = colors[i % colors.length];

                ctx.beginPath();
                ctx.fillStyle = baseColor;
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fill();

                // Add inner stroke for definition
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();

                ctx.save();
                ctx.fillStyle = '#495057';
                ctx.font = `800 ${fontSize}px 'Rounded Mplus 1c', sans-serif`;
                ctx.shadowColor = 'rgba(255,255,255,0.8)';
                ctx.shadowBlur = 2;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                ctx.textBaseline = 'middle';
                const midAngle = startAngle + arcSize / 2;
                ctx.translate(centerX, centerY);
                ctx.rotate(midAngle);
                const isReversed = (midAngle > Math.PI / 2 && midAngle < Math.PI * 1.5);
                ctx.textAlign = 'center';

                if (isReversed) {
                    ctx.rotate(Math.PI);
                    ctx.fillText(participants[i], -(radius * 0.5), 0);
                } else {
                    ctx.fillText(participants[i], (radius * 0.5), 0);
                }
                ctx.restore();
            }
        }

        function startSpinProcess() {
            if (isSpinning) return;
            if (participants.length === 0) return;

            isSpinning = true;
            toggleControls(false);

            spinsRemaining = parseInt(drawCountSelect.value) || 1;
            if (spinsRemaining > participants.length) {
                spinsRemaining = participants.length;
            }
            currentWinners = [];

            performSingleSpin();
        }

        const spinDuration = 6000;

        function performSingleSpin() {
            if (spinsRemaining <= 0 || participants.length === 0) {
                endSpinProcess();
                return;
            }

            originalParticipantsBeforeSpin = [...participants];

            const durationInSeconds = spinDuration / 1000;
            const rotations = 5;

            const randomSpin = Math.random() * 360;
            const totalRotation = (rotations * 360) + randomSpin;

            currentRotation += totalRotation;

            canvas.style.transition = `transform ${durationInSeconds}s cubic-bezier(0.1, 0.8, 0.2, 1)`;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(handleSpinEnd, spinDuration);
        }

        function handleSpinEnd() {
            if (!isSpinning) return;

            const numSegments = originalParticipantsBeforeSpin.length;
            if (numSegments === 0) return;

            const degreesPerSegment = 360 / numSegments;
            const offsetDegrees = 0; // Pointer is on the right
            const normalizedAngle = (360 - (currentRotation % 360) + offsetDegrees) % 360;
            const winnerIndex = Math.floor(normalizedAngle / degreesPerSegment);

            const winner = originalParticipantsBeforeSpin[winnerIndex];

            currentWinners.push(winner);
            spinsRemaining--;

            const end = Date.now() + 3 * 1000;

            (function frame() {
                confetti({
                    particleCount: 12,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ffb3d9', '#cae9ff', '#e4c1f9', '#d8f3dc', '#ffe6a7', '#ffc8dd']
                });
                confetti({
                    particleCount: 12,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ffb3d9', '#cae9ff', '#e4c1f9', '#d8f3dc', '#ffe6a7', '#ffc8dd']
                });

                confetti({
                    particleCount: 25,
                    spread: 160,
                    origin: { y: 0.6 },
                    colors: ['#ffb3d9', '#cae9ff', '#e4c1f9', '#d8f3dc', '#ffe6a7', '#ffc8dd'],
                    zIndex: 200
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            const indexToRemove = participants.indexOf(winner);
            if (indexToRemove > -1) {
                participants.splice(indexToRemove, 1);
            }
            nameListTextArea.value = participants.join('\n');

            if (spinsRemaining > 0) {
                setTimeout(() => {
                    updateWheelFromList();
                    performSingleSpin();
                }, 1500);
            } else {
                endSpinProcess();
            }
        }

        function endSpinProcess() {
            isSpinning = false;
            toggleControls(true);

            canvas.style.transition = 'transform 0s linear';

            showWinnerModal();
        }

        function toggleControls(enabled) {
            spinButton.disabled = !enabled;
            updateButton.disabled = !enabled;
            drawCountSelect.disabled = !enabled;
            nameListTextArea.disabled = !enabled;
        }

        // --- DÉMARRAGE ---
        spinButton.addEventListener('click', startSpinProcess);

        // LA LIGNE QUI CASSAIT TOUT (le 'g' fantôme) EST VÉRIFIÉE
        updateButton.addEventListener('click', updateWheelFromList);

        closeModalButton.addEventListener('click', () => {
            hideWinnerModal();
            updateWheelFromList();
            setRandomButtonText();
        });

        // Chargement initial
        nameListTextArea.value = defaultParticipants.join('\n');
        setRandomButtonText();
        updateWheelFromList();


    </script>
</body>
</html>
